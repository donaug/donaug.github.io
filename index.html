
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Vitrine de Produtos - Mercado Livre (Afiliado)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #333;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .titulo {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }
        .preco {
            font-size: 18px;
            font-weight: 700;
            color: #3483fa;
            margin-bottom: 10px;
        }
        .btn {
            margin-top: auto;
            display: inline-block;
            text-align: center;
            background: #3483fa;
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
        }
        .btn:hover {
            background: #2968c8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ofertas Selecionadas do Mercado Livre</h1>
        <div class="grid">

        </div>
    </div>
</body>
</html>
